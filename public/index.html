<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人看板 — OpenClaw</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
    nav { display: flex; gap: 4px; flex-wrap: wrap; }
    .tab {
      background: none; border: 1px solid transparent; color: var(--muted);
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); border-color: var(--border); }
    .tab.active { background: var(--card); border-color: var(--accent); color: var(--accent); }

    main { max-width: 1400px; margin: 0 auto; padding: 20px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 12px; font-size: 12px; color: var(--muted);
    }
    .stat-chip span { color: var(--accent); font-weight: 600; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .card-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .desc { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }

    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
    .tag { background: rgba(88,166,255,0.1); color: var(--accent); font-size: 11px; padding: 1px 7px; border-radius: 10px; }
    .tag.twse    { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .tag.memory  { background: rgba(63,185,80,0.15);  color: var(--green); }
    .tag.obsidian { background: rgba(188,140,255,0.15); color: var(--purple); }

    .status {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      font-weight: 600; white-space: nowrap;
    }
    .status.active     { background: rgba(63,185,80,0.15);  color: var(--green); }
    .status.completed  { background: rgba(63,185,80,0.15);  color: var(--green); }
    .status.onhold     { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .status.planning   { background: rgba(88,166,255,0.15); color: var(--accent); }

    .source-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 6px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .source-badge.twse      { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .source-badge.notes     { background: rgba(88,166,255,0.15); color: var(--accent); }
    .source-badge.memory    { background: rgba(63,185,80,0.15);  color: var(--green); }
    .source-badge.obsidian { background: rgba(188,140,255,0.15); color: var(--purple); }

    .progress-wrap { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
    .progress-bar { flex: 1; height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .progress-fill.green  { background: var(--green); }
    .progress-fill.yellow { background: var(--yellow); }
    .progress-fill.red   { background: var(--red); }
    .progress-pct { font-size: 11px; color: var(--muted); min-width: 28px; }

    .list-label { font-size: 11px; color: var(--muted); margin-top: 6px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .list-item { font-size: 12px; color: var(--text); padding: 2px 0; border-bottom: 1px solid rgba(48,54,61,0.3); }
    .list-item:last-child { border-bottom: none; }

    /* ── Jobs ── */
    .job-timeline { display: flex; flex-direction: column; gap: 12px; }
    .job-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .job-item-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .job-type-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .job-type-badge.heartbeat { background: rgba(63,185,80,0.15); color: var(--green); }
    .job-type-badge.cron { background: rgba(88,166,255,0.15); color: var(--accent); }
    .job-type-badge.launchctl { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .job-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .job-schedule { font-size: 12px; color: var(--muted); margin-left: auto; }
    .job-next { font-size: 12px; color: var(--yellow); margin-top: 4px; }
    .job-last { font-size: 11px; color: var(--muted); }
    .job-history { margin-top: 8px; }
    .job-history-item { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); padding: 3px 0; border-bottom: 1px solid rgba(48,54,61,0.4); }
    .job-history-item:last-child { border-bottom: none; }
    .jh-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .jh-ok { background: var(--green); }
    .jh-fail { background: var(--red); }
    .jh-unknown { background: var(--muted); }

    /* ── Graph ── */
    #graph-section { display: none; }
    #graph-section.active { display: flex; flex-direction: column; gap: 16px; }
    #graph-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); height: 560px; position: relative; }
    #graph-canvas { width: 100%; height: 100%; }
    #graph-legend { position: absolute; top: 12px; right: 12px; background: rgba(13,17,23,0.88); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--muted); pointer-events: none; }
    .leg-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-line { width: 20px; border-top: 1px solid; opacity: 0.7; }
    #graph-info { position: absolute; bottom: 12px; left: 12px; background: rgba(13,17,23,0.88); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--accent); min-width: 200px; transition: opacity 0.2s; max-width: 280px; }
    #graph-info.hidden { opacity: 0; pointer-events: none; }
    #gi-title { font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 13px; }
    #gi-type { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    #gi-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    #gi-desc { font-size: 12px; color: #8b949e; margin-top: 4px; }

    .graph-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .graph-controls select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; }
    .graph-controls select:focus { outline: none; border-color: var(--accent); }
    .graph-controls label { font-size: 13px; color: var(--muted); }

    /* D3 */
    .node { cursor: pointer; }
    .node circle { stroke: #161b22; stroke-width: 1.5px; }
    .node text { fill: #e6edf3; font-size: 10px; pointer-events: none; dominant-baseline: middle; text-anchor: middle; }
    .link { stroke: #30363d; stroke-opacity: 0.6; }
    .link.tag { stroke: #58a6ff; stroke-opacity: 0.35; }
    .link.project-note { stroke: #d29922; stroke-opacity: 0.5; stroke-dasharray: 3,3; }

    .d3-tooltip { position: fixed; background: rgba(22,27,34,0.96); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--text); pointer-events: none; z-index: 9999; max-width: 220px; display: none; line-height: 1.5; }

    footer { border-top: 1px solid var(--border); padding: 10px 20px; font-size: 12px; color: var(--muted); }

    .empty { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }

    .stock-id { font-size: 11px; color: var(--yellow); font-weight: 600; margin-bottom: 2px; }

    /* Memory filter bar */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Job Cards */
    .job-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .job-card:hover { border-color: var(--accent); }
    .job-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .job-card-icon { font-size: 24px; flex-shrink: 0; }
    .job-card-info { flex: 1; }
    .job-card-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .job-card-trigger { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .job-card-next { text-align: right; flex-shrink: 0; }
    .job-card-next-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .job-card-next-time { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }
    .job-card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); }
    .job-card-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-running { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-active  { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-stopped { background: rgba(248,81,73,0.15); color: var(--red); }
    .job-card-history-hint { font-size: 11px; color: var(--muted); }

    /* Modal */
    .modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
    .modal-card { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto; padding: 20px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .modal-job-name { font-size: 18px; font-weight: 700; color: var(--text); }
    .modal-job-trigger { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .modal-close { background: none; border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .modal-meta-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
    .modal-meta-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
    .modal-meta-item span:last-child { font-size: 14px; font-weight: 600; color: var(--text); }
    .modal-history-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .modal-history { display: flex; flex-direction: column; gap: 6px; }
    .modal-hist-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
    .modal-hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .modal-hist-ok { background: var(--green); }
    .modal-hist-fail { background: var(--red); }
    .modal-hist-time { color: var(--muted); min-width: 140px; }
    .modal-hist-msg { color: var(--text); flex: 1; word-break: break-all; }
    .proj-body { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; max-height: 400px; overflow-y: auto; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-top: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 個人看板</h1>
    <nav>
      <button class="tab active" data-tab="projects">📋 專案</button>

      <button class="tab" data-tab="memory">🧩 記憶</button>
      <button class="tab" data-tab="jobs">⏰ 定時作業</button>
      <button class="tab" data-tab="graph-section">🕸️ 關聯圖</button>
    </nav>
  </header>

  <main>
    <!-- PROJECTS -->
    <section id="projects" class="tab-content active">
      <div class="section-stats" id="projects-stats"></div>
      <div class="grid" id="projects-grid"></div>
    </section>

    <!-- FILES -->

    <!-- MEMORY -->
    <section id="memory" class="tab-content">
      <div class="section-stats" id="memory-stats"></div>
      <div class="filter-bar" id="memory-filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="notes">📄 notes</button>
        <button class="filter-btn" data-filter="twse">📊 台股季報</button>
        <button class="filter-btn" data-filter="memory">💾 session</button>
        <button class="filter-btn" data-filter="obsidian">💎 Obsidian</button>
      </div>
      <div class="grid" id="memory-grid"></div>
    </section>

    <!-- JOBS -->
    <section id="jobs" class="tab-content">
      <div class="job-timeline" id="jobs-list"></div>
    </section>

    <!-- GRAPH -->
    <section id="graph-section" class="tab-content">
      <div class="graph-controls">
        <label>節點：</label>
        <select id="graph-node-filter">
          <option value="all">全部</option>
          <option value="notes">notes</option>
          <option value="memory">session</option>
          <option value="obsidian">Obsidian</option>
        </select>
        <span class="stat-chip" id="graph-node-count"></span>
      </div>
      <div id="graph-wrap">
        <svg id="graph-canvas"></svg>
        <div id="graph-legend">
          <div class="leg-item"><div class="leg-dot" style="background:#58a6ff"></div> 專案</div>
          <div class="leg-item"><div class="leg-dot" style="background:#3fb950"></div> session</div>
          <div class="leg-item"><div class="leg-dot" style="background:#d29922"></div> notes</div>
          <div class="leg-item"><div class="leg-dot" style="background:#bc8cff"></div> Obsidian</div>
          <div style="margin-top:8px;border-top:1px solid #30363d;padding-top:8px">
          <div class="leg-item"><div class="leg-line" style="border-color:#58a6ff;opacity:0.5"></div> 標籤連線</div>
          <div class="leg-item"><div class="leg-line" style="border-color:#d29922;opacity:0.5;border-top-style:dashed"></div> 含筆記連線</div>
          </div>
        </div>
        <div id="graph-info" class="hidden">
          <div id="gi-title"></div>
          <div id="gi-type"></div>
          <div id="gi-tags"></div>
          <div id="gi-desc"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    資料更新：<span id="last-updated"></span>
  </footer>

  <!-- Job Detail Modal -->
  <div id="job-modal" class="modal" style="display:none">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-job-name" id="jm-name"></div>
          <div class="modal-job-trigger" id="jm-trigger"></div>
        </div>
        <button class="modal-close" id="jm-close">✕</button>
      </div>
      <div class="modal-meta">
        <div class="modal-meta-item"><span class="modal-meta-label">下次觸發</span><span id="jm-next"></span></div>
        <div class="modal-meta-item"><span class="modal-meta-label">上次執行</span><span id="jm-last"></span></div>
      </div>
      <div class="modal-history-label">執行歷史</div>
      <div class="modal-history" id="jm-history"></div>
    </div>
  </div>

  <!-- Project Detail Modal -->
  <div id="proj-modal" class="modal" style="display:none">
    <div class="modal-backdrop" id="proj-modal-backdrop"></div>
    <div class="modal-card" style="max-width:720px">
      <div class="modal-header">
        <div>
          <div class="modal-job-name" id="pm-name"></div>
          <div class="modal-job-trigger" id="pm-status"></div>
        </div>
        <button class="modal-close" id="pm-close">✕</button>
      </div>
      <div id="pm-progress"></div>
      <div id="pm-tags"></div>
      <div id="pm-body" class="proj-body"></div>
      <div id="pm-files"></div>
      <div class="modal-meta" style="margin-top:16px">
        <div class="modal-meta-item"><span class="modal-meta-label">路徑</span><span id="pm-path" style="font-size:12px;word-break:break-all"></span></div>
        <div class="modal-meta-item"><span class="modal-meta-label">更新時間</span><span id="pm-updated"></span></div>
      </div>
    </div>
  </div>

  <!-- Memory Detail Modal -->
  <div id="mem-modal" class="modal" style="display:none">
    <div class="modal-backdrop" id="mem-modal-backdrop"></div>
    <div class="modal-card" style="max-width:720px">
      <div class="modal-header">
        <div>
          <div class="modal-job-name" id="mem-name"></div>
          <div class="modal-job-trigger"><span class="source-badge" id="mem-source"></span></div>
        </div>
        <button class="modal-close" id="mem-close">✕</button>
      </div>
      <div id="mem-tags"></div>
      <div id="mem-body" class="proj-body" style="white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto"></div>
      <div class="modal-meta" style="margin-top:16px">
        <div class="modal-meta-item"><span class="modal-meta-label">路徑</span><span id="mem-path" style="font-size:12px;word-break:break-all"></span></div>
        <div class="modal-meta-item"><span class="modal-meta-label">日期</span><span id="mem-date"></span></div>
        <div class="modal-meta-item" id="mem-stock-row" style="display:none"><span class="modal-meta-label">股票</span><span id="mem-stock"></span></div>
      </div>
    </div>
  </div>

  <div class="d3-tooltip" id="d3-tooltip"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
