name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create CF Pages project (if not exists)
        run: wrangler pages project create openclaw-dashboard || true

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=openclaw-dashboard --commit-message="$GITHUB_SHA" --commit-dirty=true
